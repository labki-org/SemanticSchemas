services:
  wiki:
    build: .
    ports:
      - "8889:80"
    environment:
      MW_DB_HOST: db
      MW_DB_NAME: wiki
      MW_DB_USER: wiki
      MW_DB_PASSWORD: wiki_pass
      MW_ADMIN_USER: Admin
      MW_ADMIN_PASS: dockerpass
    volumes:
      - ./:/mw-user-extensions/SemanticSchemas
      - ./tests/LocalSettings.test.php:/mw-config/LocalSettings.user.php
    depends_on:
      db:
        condition: service_healthy

  jobrunner:
    build: .
    environment:
      MW_DB_HOST: db
      MW_DB_NAME: wiki
      MW_DB_USER: wiki
      MW_DB_PASSWORD: wiki_pass
    volumes:
      - ./:/mw-user-extensions/SemanticSchemas
      - ./tests/LocalSettings.test.php:/mw-config/LocalSettings.user.php
    depends_on:
      db:
        condition: service_healthy
      wiki:
        condition: service_started
    entrypoint: []
    command: >
      bash -c "
        echo 'Waiting for wiki to be ready...' &&
        sleep 10 &&
        echo 'Starting job runner...' &&
        while true; do
          php /var/www/html/maintenance/runJobs.php --wait --maxjobs=10;
          sleep 1;
        done
      "
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: wiki
      MARIADB_USER: wiki
      MARIADB_PASSWORD: wiki_pass
      MARIADB_ROOT_PASSWORD: root_pass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
